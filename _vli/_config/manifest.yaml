name: vli
displayName: "VLI - Venda com Landing de Imovel"
version: 0.1.0
description: "Sistema de criacao guiada de Landing Pages para venda de imoveis. Um comando, 15 agentes especialistas, 4 templates."
author: "Marcelo Leal"
license: MIT
repository: "https://github.com/marceloleal/lp-imovel"
npmPackage: "lp-imovel"

ides:
  - claude-code
  - codex
  - gemini
  - opencode
  - trae
  - antigravity

modules:
  - name: core
    version: 0.1.0
    source: built-in

entryCommand: "/lp"
helpCommand: "/lp-help"

paths:
  output: "{project-root}/_lp-output"
  session: "{project-root}/_lp-output/.sessao.json"
  config: "{install-root}/_vli/core/config.yaml"
